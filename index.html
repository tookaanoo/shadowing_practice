<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadowing Practice</title>
<style>
  /* ==============================
     FONTS
     ============================== */
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap');

  :root {
    --bg-0: #0a0e1a;
    --bg-1: #111729;
    --bg-2: #1a2238;
    --bg-3: #232d4a;
    --border: #2a3553;
    --border-soft: #1f2942;
    --text-0: #f1f5ff;
    --text-1: #c8d1e8;
    --text-2: #8b94b3;
    --text-3: #5a6585;
    --accent: #7ab8ff;
    --accent-dim: #4a78bf;
    --accent-soft: rgba(122, 184, 255, 0.12);
    --jp-accent: #b89eff;
    --jp-accent-soft: rgba(184, 158, 255, 0.1);
    --good: #6eddb0;
    --warn: #ffb86b;
    --bad: #ff7b8d;
    --shadow-1: 0 4px 20px rgba(0, 0, 0, 0.3);
    --shadow-2: 0 8px 40px rgba(0, 0, 0, 0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: 'Manrope', 'Noto Sans JP', sans-serif;
    background: var(--bg-0);
    background-image:
      radial-gradient(ellipse at top left, rgba(122, 184, 255, 0.06), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(184, 158, 255, 0.05), transparent 50%);
    background-attachment: fixed;
    color: var(--text-0);
    overflow-x: hidden;
    line-height: 1.5;
  }

  /* ==============================
     LAYOUT
     ============================== */
  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: 100vh;
    max-height: 100vh;
  }

  /* ----- Sidebar ----- */
  .sidebar {
    background: var(--bg-1);
    border-right: 1px solid var(--border-soft);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-search {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border-soft);
  }
  .search-input {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text-0);
    padding: 9px 12px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    transition: border-color 0.15s, background 0.15s;
  }
  .search-input::placeholder { color: var(--text-3); }
  .search-input:focus {
    outline: none;
    border-color: var(--accent-dim);
    background: var(--bg-3);
  }

  .construction-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 8px 16px;
  }
  .construction-list::-webkit-scrollbar { width: 8px; }
  .construction-list::-webkit-scrollbar-thumb {
    background: var(--bg-3);
    border-radius: 4px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 14px 14px 8px;
  }

  .construction-item {
    padding: 9px 12px;
    border-radius: 7px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-1);
    font-size: 13px;
    transition: background 0.12s, color 0.12s;
    margin: 1px 4px;
  }
  .construction-item:hover {
    background: var(--bg-2);
    color: var(--text-0);
  }
  .construction-item.active {
    background: var(--accent-soft);
    color: var(--accent);
  }
  .construction-item.active .item-num {
    background: var(--accent);
    color: var(--bg-0);
  }
  .construction-item.story-focus {
    background: var(--accent-soft);
    color: var(--accent);
    box-shadow: inset 0 0 0 1.5px var(--accent);
  }
  .construction-item.story-focus .item-num {
    background: var(--accent);
    color: var(--bg-0);
  }
  @keyframes storyFocusPulse {
    0% { box-shadow: inset 0 0 0 1.5px var(--accent), 0 0 0 0 var(--accent-soft); }
    100% { box-shadow: inset 0 0 0 1.5px var(--accent), 0 0 0 8px transparent; }
  }
  .construction-item.story-focus.pulse {
    animation: storyFocusPulse 0.5s ease-out;
  }
  .construction-item.placeholder {
    color: var(--text-3);
    opacity: 0.5;
  }
  .construction-item.placeholder:hover {
    background: transparent;
    cursor: default;
  }

  .item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    background: var(--bg-3);
    color: var(--text-2);
    padding: 2px 6px;
    border-radius: 4px;
    min-width: 30px;
    text-align: center;
    transition: background 0.12s, color 0.12s;
  }
  .item-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 500;
  }

  /* ----- Main ----- */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .main-header {
    padding: 14px 36px 12px;
    border-bottom: 1px solid var(--border-soft);
    background: var(--bg-1);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }
  .header-top > div:first-child {
    flex: 1;
    min-width: 0;
  }

  .pattern-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--text-0);
    letter-spacing: -0.01em;
    line-height: 1.25;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pattern-title .pattern-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 2px 6px;
    border-radius: 5px;
    margin-right: 8px;
    vertical-align: middle;
    font-weight: 600;
  }
  .pattern-meaning {
    color: var(--text-2);
    font-size: 12px;
    margin-top: 3px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ==============================
     STAGE (the example display)
     ============================== */
  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    overflow-y: auto;
    position: relative;
  }

  .progress-row {
    position: absolute;
    top: 20px;
    left: 36px;
    right: 36px;
    display: flex;
    gap: 4px;
  }
  .progress-pip {
    flex: 1;
    height: 3px;
    background: var(--bg-2);
    border-radius: 2px;
    transition: background 0.2s;
  }
  .progress-pip.done { background: var(--accent-dim); }
  .progress-pip.current { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  .example-card {
    max-width: 800px;
    width: 100%;
    text-align: center;
  }
  .example-counter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: 0.15em;
    margin-bottom: 28px;
    text-transform: uppercase;
  }
  .example-counter .current {
    color: var(--accent);
    font-weight: 700;
  }

  .example-en {
    font-size: 44px;
    font-weight: 600;
    color: var(--text-0);
    letter-spacing: -0.02em;
    line-height: 1.3;
    margin-bottom: 28px;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .example-ja {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--jp-accent);
    background: var(--jp-accent-soft);
    padding: 16px 28px;
    border-radius: 12px;
    display: inline-block;
    transition: opacity 0.2s, transform 0.2s;
  }
  .example-ja.hidden {
    opacity: 0;
    transform: translateY(-4px);
    pointer-events: none;
    user-select: none;
  }

  .placeholder-message {
    text-align: center;
    color: var(--text-3);
    font-size: 15px;
    max-width: 480px;
    line-height: 1.6;
  }
  .placeholder-message strong {
    color: var(--text-1);
    display: block;
    font-size: 17px;
    margin-bottom: 8px;
  }

  /* ==============================
     CONTROLS (bottom bar)
     ============================== */
  .controls {
    background: var(--bg-1);
    border-top: 1px solid var(--border-soft);
    padding: 14px 36px 16px;
  }

  .controls-main {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .btn {
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text-1);
    padding: 10px 14px;
    border-radius: 9px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }
  .btn:hover {
    background: var(--bg-3);
    color: var(--text-0);
    border-color: var(--accent-dim);
  }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn:disabled:hover { background: var(--bg-2); border-color: var(--border); color: var(--text-1); }

  .btn-icon {
    padding: 0;
    width: 42px;
    height: 42px;
    min-width: 42px;
  }
  .btn-icon svg { display: block; }

  .btn-primary {
    background: var(--accent);
    color: var(--bg-0);
    border-color: var(--accent);
    width: 52px;
    height: 52px;
    min-width: 52px;
    border-radius: 50%;
  }
  .btn-primary:hover {
    background: #95c8ff;
    border-color: #95c8ff;
    color: var(--bg-0);
  }
  .btn-primary.playing {
    background: var(--warn);
    border-color: var(--warn);
    color: var(--bg-0);
  }
  .btn-primary.playing:hover {
    background: #ffc483;
    border-color: #ffc483;
  }
  .btn-primary.playing .icon-play { display: none; }
  .btn-primary.playing .icon-pause { display: block !important; }

  .controls-options {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 28px;
    flex-wrap: wrap;
    color: var(--text-2);
    font-size: 12px;
  }
  .option {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
  }
  .option label { cursor: pointer; }
  .option select, .option input[type="number"] {
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text-0);
    padding: 5px 8px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  .option select:focus, .option input:focus {
    outline: none;
    border-color: var(--accent-dim);
  }
  .option input[type="number"] { width: 56px; }

  .option-toggle {
    background: var(--bg-2);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 6px;
    color: var(--text-2);
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.15s;
  }
  .option-toggle.on {
    background: var(--accent-soft);
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  /* ==============================
     VIEW SWITCHER (Drill / Browse)
     ============================== */
  .view-switcher {
    display: flex;
    gap: 4px;
    padding: 4px;
    background: var(--bg-2);
    border-radius: 9px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .view-switcher button {
    background: transparent;
    border: none;
    color: var(--text-2);
    padding: 6px 14px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .view-switcher button:hover { color: var(--text-0); }
  .view-switcher button.active {
    background: var(--accent-soft);
    color: var(--accent);
  }

  /* ==============================
     BROWSE VIEW (all examples)
     ============================== */
  .browse-view {
    flex: 1;
    overflow-y: auto;
    padding: 28px 36px 60px;
    display: none;
  }
  .browse-view.active { display: block; }
  .drill-view { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  .drill-view.hidden { display: none; }

  .browse-section {
    margin-bottom: 36px;
  }
  .browse-section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-3);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-soft);
  }

  .browse-construction {
    background: var(--bg-1);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    padding: 18px 22px;
    margin-bottom: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .browse-construction:hover {
    border-color: var(--accent-dim);
  }
  .browse-construction.current {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent-soft), 0 0 24px rgba(122, 184, 255, 0.15);
  }

  .browse-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }
  .browse-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 3px 7px;
    border-radius: 5px;
    font-weight: 600;
  }
  .browse-pattern {
    font-size: 17px;
    font-weight: 700;
    color: var(--text-0);
    letter-spacing: -0.01em;
  }
  .browse-meaning {
    font-size: 12px;
    color: var(--text-2);
    margin-bottom: 14px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .browse-jump {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-2);
    padding: 4px 10px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    margin-left: auto;
  }
  .browse-jump:hover {
    background: var(--accent-soft);
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  .browse-examples {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 24px;
  }
  .browse-ex {
    display: grid;
    grid-template-columns: 22px 1fr;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border-soft);
    align-items: start;
  }
  .browse-ex:last-child,
  .browse-ex:nth-last-child(2) {
    border-bottom: none;
  }
  .browse-ex-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-3);
    line-height: 1.5;
    padding-top: 2px;
  }
  .browse-ex-text {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .browse-ex-en {
    font-size: 14px;
    color: var(--text-0);
    line-height: 1.4;
    font-weight: 500;
  }
  .browse-ex-ja {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    color: var(--text-2);
    line-height: 1.4;
  }
  @media (max-width: 900px) {
    .browse-examples { grid-template-columns: 1fr; }
    .browse-ex:nth-last-child(2) { border-bottom: 1px solid var(--border-soft); }
  }

  /* ==============================
     STORY VIEW
     ============================== */
  .story-view {
    flex: 1;
    overflow-y: auto;
    display: none;
    flex-direction: column;
  }
  .story-view.active { display: flex; }

  .story-list {
    padding: 28px 36px 60px;
  }
  .story-card {
    background: var(--bg-1);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 22px 26px;
    margin-bottom: 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .story-card:hover {
    border-color: var(--accent-dim);
    transform: translateY(-2px);
  }
  .story-card.locked {
    opacity: 0.5;
    cursor: default;
  }
  .story-card.locked:hover {
    border-color: var(--border-soft);
    transform: none;
  }
  .story-chapter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .story-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-0);
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .story-subtitle {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    color: var(--text-2);
    margin-bottom: 10px;
  }
  .story-meta {
    font-size: 11px;
    color: var(--text-3);
    display: flex;
    gap: 12px;
  }

  /* Story reader */
  .story-reader {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }
  .story-reader.active { display: flex; }

  .story-reader-header {
    padding: 18px 36px 14px;
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    background: var(--bg-1);
  }
  .story-back {
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text-1);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }
  .story-back:hover {
    background: var(--bg-3);
    color: var(--text-0);
  }
  .story-reader-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-0);
    flex: 1;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .story-settings {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 10px 36px;
    border-bottom: 1px solid var(--border-soft);
    background: var(--bg-1);
    flex-wrap: wrap;
  }
  .story-settings .option { margin: 0; }
  .story-play-all {
    background: var(--accent);
    color: var(--bg-0);
    border: none;
    padding: 0;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .story-play-all:hover {
    background: #95c8ff;
  }
  .story-play-all.playing {
    background: var(--warn);
  }

  .story-body {
    flex: 1;
    overflow-y: auto;
    padding: 28px 40px 60px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  .story-sentence {
    padding: 14px 16px;
    border-radius: 10px;
    margin-bottom: 8px;
    transition: background 0.2s;
    cursor: pointer;
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 12px;
    align-items: start;
  }
  .story-sentence:hover {
    background: var(--bg-2);
  }
  .story-sentence.current {
    background: var(--accent-soft);
  }
  .story-sentence-icon {
    color: var(--text-3);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .story-sentence:hover .story-sentence-icon {
    background: var(--bg-3);
    color: var(--accent);
  }
  .story-sentence.current .story-sentence-icon {
    background: var(--accent);
    color: var(--bg-0);
  }
  .story-sentence-text {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
  }
  .story-sentence-en {
    font-size: 19px;
    color: var(--text-0);
    line-height: 1.5;
    font-weight: 500;
  }
  .story-sentence-ja {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    color: var(--text-2);
    line-height: 1.55;
  }
  .story-sentence-ja.hidden {
    display: none;
  }

  @media (max-width: 800px) {
    .story-list { padding: 20px 16px 40px; }
    .story-reader-header { padding: 12px 16px 10px; }
    .story-settings { padding: 8px 16px; gap: 14px; }
    .story-reader-title { font-size: 14px; }
    .story-body { padding: 20px 16px 40px; }
    .story-sentence { padding: 10px 12px; gap: 10px; }
    .story-sentence-en { font-size: 16px; }
    .story-sentence-ja { font-size: 12px; }
  }

  /* ----- responsive ----- */
  @media (max-width: 800px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .sidebar {
      max-height: 38vh;
      border-right: none;
      border-bottom: 1px solid var(--border-soft);
    }
    .main-header { padding: 10px 16px 8px; }
    .pattern-title { font-size: 15px; }

      { en: "The next day, I talked it through with Lina over coffee.", ja: "翌日、私はコーヒーを飲みながらリナとじっくり話した。", c: [] },

      { en: "\"Exactly,\" I said. \"At this point, it's all about where I want my life to be.\"", ja: "「その通り」と私は言った。「今となっては、すべては自分の人生をどこに置きたいか次第なんだ」", c: [116] },
      { en: "\"From the perspective of someone who left her own country, I get it,\" Lina said.", ja: "「自分の国を離れた人間の視点から言うと、すごく分かるよ」とリナは言った。", c: [112] },
      { en: "\"Like I said before, you've already built a home here, whether you see it or not.\"", ja: "「前にも言ったけど、気づいてるかどうかは別として、あなたはもうここに居場所を築いてるんだよ」", c: [114] },
      { en: "\"I might be wrong, but I think you already know your answer.\"", ja: "「私が間違ってるかもしれないけど、あなたはもう答えを知ってる気がする」", c: [118] },
      { en: "I sat with that for a long moment.", ja: "私はその言葉を、しばらくかみしめていた。", c: [] },
      { en: "\"I'm more of a slow decider,\" I admitted. \"Give me a little time.\"", ja: "「僕はどちらかというと、じっくり決めるタイプなんだ」と私は認めた。「少し時間をくれ」", c: [115] },
      { en: "\"If that works for you, take all the time you need,\" she smiled.", ja: "「それでいいなら、好きなだけ時間をかけて」と彼女は微笑んだ。", c: [105] },
      { en: "\"Off-topic, but have you eaten? You always think better when you're fed.\"", ja: "「話は変わるけど、ご飯食べた?あなた、お腹が満たされてる方がよく考えられるでしょ」", c: [107] },
      { en: "We laughed, and for a while we just talked about ordinary things.", ja: "私たちは笑い、しばらくはただ、何でもないことを話した。", c: [] },
      { en: "Over the next week, I was in the process of weighing every angle.", ja: "それからの1週間、私はあらゆる角度から検討を重ねている最中だった。", c: [102] },
      { en: "This is something that no one else could decide for me.", ja: "これは、他の誰にも代わりに決められないことだった。", c: [120] },
      { en: "I made a list, the way I always do when my head is full.", ja: "頭がいっぱいになると私はいつもそうするように、リストを作った。", c: [] },
      { en: "Stay: the team, the friends, the life I'd built.", ja: "残る——チーム、友達、自分が築いてきた生活。", c: [] },
      { en: "Leave: my family, my roots, the comfort of the familiar.", ja: "去る——家族、自分のルーツ、慣れ親しんだものの安心感。", c: [] },
      { en: "Both choices were good ones, which somehow made it harder.", ja: "どちらの選択も良いもので、それがかえって決断を難しくした。", c: [] },
      { en: "Then I remembered something Raj had said months ago.", ja: "そのとき、何か月も前にラジが言ったことを思い出した。", c: [] },
      { en: "\"Home isn't where you're from. It's where you choose to be.\"", ja: "「故郷とは、出身地のことじゃない。自分が選んでいる場所のことだ」", c: [] },
      { en: "The morning I decided, the city was quiet and golden.", ja: "決断した朝、街は静かで、金色に輝いていた。", c: [] },
      { en: "I walked into Ms. Tan's office and told her I would stay.", ja: "私はタンさんのオフィスに入り、残りますと伝えた。", c: [] },
      { en: "\"I had a feeling,\" she said, shaking my hand. \"Welcome aboard, properly this time.\"", ja: "「そんな気がしてたわ」と彼女は私と握手した。「今度こそ、正式にようこそ」", c: [] },
      { en: "I called my parents that evening with the news.", ja: "その晩、私はその知らせを両親に電話で伝えた。", c: [] },
      { en: "There was a pause, and then my mother said she was happy for me.", ja: "少し間があって、それから母は、良かったね、と言ってくれた。", c: [] },
      { en: "\"Come visit often,\" she said. \"And we'll come to you.\"", ja: "「ちょくちょく帰ってきなさい」と母は言った。「私たちも会いに行くから」", c: [] },
      { en: "That weekend, Lina and Raj took me out to mark the decision.", ja: "その週末、リナとラジが、決断を祝って私を連れ出してくれた。", c: [] },
      { en: "\"To staying,\" Raj said, raising his glass. \"And to whatever comes next.\"", ja: "「残ることに」とラジがグラスを掲げて言った。「そして、次に来る何にでも」", c: [] },
      { en: "Looking around the table, I understood how far I'd come.", ja: "テーブルを見回して、自分がどれだけ遠くまで来たのかを実感した。", c: [] },
      { en: "A year ago, I had been a stranger packing a single suitcase.", ja: "1年前、私はスーツケース1つを詰めるよそ者だった。", c: [] },

    ],
  },
];


</script>
<script>
// ============================================================
// ATSU 120選 シャドーイング・ドリル
// ============================================================

const state = {
  currentId: 1,           // 現在選択中の構文ID
  currentIdx: 0,          // 現在の例文インデックス (0-based)
  isPlaying: false,       // 自動再生中か
  shuffleOrder: null,     // シャッフル時の順序 (null = 通常順)
  showJa: true,           // 日本語訳の表示
  playToken: 0,           // 再生キャンセル用トークン
};

const el = {
  list:        document.getElementById('constructionList'),
  search:      document.getElementById('searchInput'),
  patternNum:  document.getElementById('patternNum'),
  patternText: document.getElementById('patternText'),
  patternMeaning: document.getElementById('patternMeaning'),
  stage:       document.getElementById('stage'),
  card:        document.getElementById('exampleCard'),
  progressRow: document.getElementById('progressRow'),
  exCurrent:   document.getElementById('exCurrent'),
  exTotal:     document.getElementById('exTotal'),
  exampleEn:   document.getElementById('exampleEn'),
  exampleJa:   document.getElementById('exampleJa'),
  btnPrev:     document.getElementById('btnPrev'),
  btnNext:     document.getElementById('btnNext'),
  btnSpeak:    document.getElementById('btnSpeak'),
  btnPlay:     document.getElementById('btnPlay'),
  btnShuffle:  document.getElementById('btnShuffle'),
  btnRandomC:  document.getElementById('btnRandomC'),
  optMode:     document.getElementById('optMode'),
  optRate:     document.getElementById('optRate'),
  optRepeat:   document.getElementById('optRepeat'),
  optGap:      document.getElementById('optGap'),
  optFlow:     document.getElementById('optFlow'),
  optShowJa:   document.getElementById('optShowJa'),
  tabDrill:    document.getElementById('tabDrill'),
  tabBrowse:   document.getElementById('tabBrowse'),
  tabStory:    document.getElementById('tabStory'),
  drillView:   document.getElementById('drillView'),
  browseView:  document.getElementById('browseView'),
  storyView:   document.getElementById('storyView'),
};

// ============================================================
// SIDEBAR LIST
// ============================================================
function renderList(filter = '') {
  el.list.innerHTML = '';
  const filterLower = filter.toLowerCase();
  let currentSection = null;

  CONSTRUCTIONS.forEach(c => {
    const matches = !filter ||
      c.pattern.toLowerCase().includes(filterLower) ||
      c.meaning.toLowerCase().includes(filterLower) ||
      String(c.id).includes(filter);

    if (!matches) return;

    if (c.section !== currentSection) {
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = c.section;
      el.list.appendChild(label);
      currentSection = c.section;
    }

    const item = document.createElement('div');
    item.className = 'construction-item';
    if (c.placeholder) item.classList.add('placeholder');
    if (c.id === state.currentId) item.classList.add('active');
    item.dataset.id = c.id;
    item.innerHTML = `
      <span class="item-num">${String(c.id).padStart(2, '0')}</span>
      <span class="item-text">${escapeHtml(c.pattern)}</span>
    `;
    if (!c.placeholder) {
      item.addEventListener('click', () => selectConstruction(c.id));
    }
    el.list.appendChild(item);
  });
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]));
}

// ============================================================
// BROWSE VIEW (full list of all examples)
// ============================================================
let browseRendered = false;

function renderBrowseView() {
  if (browseRendered) return; // render once, then cache
  const sections = {};
  CONSTRUCTIONS.forEach(c => {
    if (c.placeholder || !c.examples.length) return;
    if (!sections[c.section]) sections[c.section] = [];
    sections[c.section].push(c);
  });

  const parts = [];
  Object.keys(sections).forEach(sec => {
    parts.push(`<div class="browse-section">`);
    parts.push(`  <div class="browse-section-title">${escapeHtml(sec)}</div>`);
    sections[sec].forEach(c => {
      parts.push(`  <div class="browse-construction" data-id="${c.id}">`);
      parts.push(`    <div class="browse-header">`);
      parts.push(`      <span class="browse-num">${String(c.id).padStart(3, '0')}</span>`);
      parts.push(`      <span class="browse-pattern">${escapeHtml(c.pattern)}</span>`);
      parts.push(`      <button class="browse-jump" data-jump="${c.id}">ドリルで開く</button>`);
      parts.push(`    </div>`);
      parts.push(`    <div class="browse-meaning">${escapeHtml(c.meaning)}</div>`);
      parts.push(`    <div class="browse-examples">`);
      c.examples.forEach((ex, i) => {
        parts.push(`      <div class="browse-ex">`);
        parts.push(`        <div class="browse-ex-num">${String(i + 1).padStart(2, '0')}</div>`);
        parts.push(`        <div class="browse-ex-text">`);
        parts.push(`          <div class="browse-ex-en">${escapeHtml(ex.en)}</div>`);
        parts.push(`          <div class="browse-ex-ja">${escapeHtml(ex.ja)}</div>`);
        parts.push(`        </div>`);
        parts.push(`      </div>`);
      });
      parts.push(`    </div>`);
      parts.push(`  </div>`);
    });
    parts.push(`</div>`);
  });

  el.browseView.innerHTML = parts.join('\n');

  // jump-to-drill buttons
  el.browseView.querySelectorAll('.browse-jump').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.jump, 10);
      selectConstruction(id);
      switchView('drill');
    });
  });

  browseRendered = true;
}

function scrollBrowseTo(id) {
  const target = el.browseView.querySelector(`.browse-construction[data-id="${id}"]`);
  if (!target) return;
  // Use getBoundingClientRect for reliable positioning regardless of layout
  const targetRect = target.getBoundingClientRect();
  const containerRect = el.browseView.getBoundingClientRect();
  // Current scroll + (target's position relative to container) - small offset for breathing room
  const delta = targetRect.top - containerRect.top;
  el.browseView.scrollTop += delta - 12;
}

function switchView(view) {
  // hide all views
  el.drillView.classList.add('hidden');
  el.browseView.classList.remove('active');
  el.storyView.classList.remove('active');
  el.tabDrill.classList.remove('active');
  el.tabBrowse.classList.remove('active');
  el.tabStory.classList.remove('active');

  if (view === 'browse') {
    stopPlaying();
    stopStoryPlay();
    renderBrowseView();
    el.browseView.classList.add('active');
    el.tabBrowse.classList.add('active');
    highlightBrowseCurrent();
    requestAnimationFrame(() => {
      requestAnimationFrame(() => scrollBrowseTo(state.currentId));
    });
  } else if (view === 'story') {
    stopPlaying();
    renderStoryView();
    el.storyView.classList.add('active');
    el.tabStory.classList.add('active');
  } else {
    stopStoryPlay();
    el.drillView.classList.remove('hidden');
    el.tabDrill.classList.add('active');
  }
}

// ============================================================
// STORY VIEW
// ============================================================
const storyState = {
  currentStoryId: null,
  isPlaying: false,
  playToken: 0,
  currentSentenceIdx: 0,
  repeat: 2,            // 各英文の繰り返し回数
  gap: 3,               // 文・繰り返しの間隔(秒)
};

function renderStoryView() {
  if (storyState.currentStoryId !== null) {
    renderStoryReader(storyState.currentStoryId);
  } else {
    renderStoryList();
  }
}

function renderStoryList() {
  const parts = ['<div class="story-list">'];
  const chapterMeta = [
    { chapter: 1, title: "A New Beginning", subtitle: "新しい始まり — 海外赴任の決意", section: "初級 (構文 1-30)" },
    { chapter: 2, title: "Finding My Way", subtitle: "自分の居場所を探して — 仕事と文化に慣れる日々", section: "中・上級 (構文 31-60)" },
    { chapter: 3, title: "Friends and Free Days", subtitle: "友達と、何でもない休日 — カジュアルな会話の日々", section: "ATSU表現 Part 1 (構文 61-80)" },
    { chapter: 4, title: "Around the Table", subtitle: "テーブルを囲んで — 会議と議論の中で", section: "ATSU表現 Part 2 (構文 81-100)" },
    { chapter: 5, title: "The Turning Point", subtitle: "転機 — キャリアと人生の選択", section: "ATSU表現 Part 3 (構文 101-120)" },
  ];

  chapterMeta.forEach(meta => {
    const story = STORIES.find(s => s.chapter === meta.chapter);
    const locked = !story;
    const cls = locked ? 'story-card locked' : 'story-card';
    const dataAttr = locked ? '' : `data-story-id="${story.id}"`;
    parts.push(`<div class="${cls}" ${dataAttr}>`);
    parts.push(`  <div class="story-chapter">Chapter ${meta.chapter}${locked ? ' · COMING SOON' : ''}</div>`);
    parts.push(`  <div class="story-title">${escapeHtml(story ? story.title : meta.title)}</div>`);
    parts.push(`  <div class="story-subtitle">${escapeHtml(story ? story.subtitle : meta.subtitle)}</div>`);
    parts.push(`  <div class="story-meta">`);
    parts.push(`    <span>${escapeHtml(meta.section)}</span>`);
    if (story) parts.push(`    <span>${story.sentences.length} 文</span>`);
    parts.push(`  </div>`);
    parts.push(`</div>`);
  });

  parts.push('</div>');
  el.storyView.innerHTML = parts.join('\n');

  el.storyView.querySelectorAll('.story-card:not(.locked)').forEach(card => {
    card.addEventListener('click', () => {
      const id = parseInt(card.dataset.storyId, 10);
      storyState.currentStoryId = id;
      storyState.currentSentenceIdx = 0;
      renderStoryReader(id);
    });
  });
}

function renderStoryReader(storyId) {
  const story = STORIES.find(s => s.id === storyId);
  if (!story) return;

  const parts = [];
  parts.push(`<div class="story-reader active">`);
  parts.push(`  <div class="story-reader-header">`);
  parts.push(`    <button class="story-back" id="storyBackBtn">← 一覧に戻る</button>`);
  parts.push(`    <div class="story-reader-title">${escapeHtml(story.title)}</div>`);
  parts.push(`    <button class="story-play-all" id="storyPlayAllBtn" title="全文再生">`);
  parts.push(`      <svg class="icon-play" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`);
  parts.push(`      <svg class="icon-pause" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`);
  parts.push(`    </button>`);
  parts.push(`  </div>`);
  parts.push(`  <div class="story-settings">`);
  parts.push(`    <div class="option">`);
  parts.push(`      <label for="storyRepeat">繰返:</label>`);
  parts.push(`      <input id="storyRepeat" max="10" min="1" type="number" value="${storyState.repeat}">`);
  parts.push(`    </div>`);
  parts.push(`    <div class="option">`);
  parts.push(`      <label for="storyGap">間隔(秒):</label>`);
  parts.push(`      <input id="storyGap" max="10" min="0" step="0.5" type="number" value="${storyState.gap}">`);
  parts.push(`    </div>`);
  parts.push(`  </div>`);
  parts.push(`  <div class="story-body" id="storyBody">`);
  story.sentences.forEach((s, i) => {
    parts.push(`    <div class="story-sentence" data-idx="${i}">`);
    parts.push(`      <div class="story-sentence-icon">`);
    parts.push(`        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`);
    parts.push(`      </div>`);
    parts.push(`      <div class="story-sentence-text">`);
    parts.push(`        <div class="story-sentence-en">${escapeHtml(s.en)}</div>`);
    parts.push(`        <div class="story-sentence-ja${state.showJa ? '' : ' hidden'}">${escapeHtml(s.ja)}</div>`);
    parts.push(`      </div>`);
    parts.push(`    </div>`);
  });
  parts.push(`  </div>`);
  parts.push(`</div>`);
  el.storyView.innerHTML = parts.join('\n');

  document.getElementById('storyBackBtn').addEventListener('click', () => {
    stopStoryPlay();
    storyState.currentStoryId = null;
    renderStoryList();
  });

  document.getElementById('storyPlayAllBtn').addEventListener('click', () => {
    if (storyState.isPlaying) {
      stopStoryPlay();
    } else {
      startStoryPlay();
    }
  });

  const repeatInput = document.getElementById('storyRepeat');
  if (repeatInput) repeatInput.addEventListener('change', () => {
    const v = parseInt(repeatInput.value, 10);
    storyState.repeat = (isNaN(v) || v < 1) ? 1 : Math.min(v, 10);
    repeatInput.value = storyState.repeat;
  });
  const gapInput = document.getElementById('storyGap');
  if (gapInput) gapInput.addEventListener('change', () => {
    const v = parseFloat(gapInput.value);
    storyState.gap = (isNaN(v) || v < 0) ? 0 : Math.min(v, 10);
    gapInput.value = storyState.gap;
  });

  el.storyView.querySelectorAll('.story-sentence').forEach(div => {
    div.addEventListener('click', () => {
      const idx = parseInt(div.dataset.idx, 10);
      storyState.currentSentenceIdx = idx;
      stopStoryPlay();
      storyState.playToken++;
      highlightStoryCurrent();
      const st = STORIES.find(s => s.id === storyState.currentStoryId);
      const sent = st && st.sentences[idx];
      focusSidebarConstructions(sent && sent.c ? sent.c : []);
      speakStorySentence(idx);
    });
  });
}

function focusSidebarConstructions(ids) {
  // clear ALL existing highlights — both the previous story focus and the
  // leftover drill-selection (.active) highlight — so only the tapped
  // sentence's construction(s) remain highlighted
  el.list.querySelectorAll('.construction-item.story-focus, .construction-item.active').forEach(n => {
    n.classList.remove('story-focus', 'pulse', 'active');
  });
  if (!ids || !ids.length) return;

  const apply = () => {
    let first = null;
    ids.forEach(id => {
      const item = el.list.querySelector(`.construction-item[data-id="${id}"]`);
      if (item) {
        item.classList.add('story-focus');
        // retrigger pulse animation
        item.classList.remove('pulse');
        void item.offsetWidth;
        item.classList.add('pulse');
        if (!first) first = id;
      }
    });
    if (first !== null) scrollSidebarTo(first);
  };

  // if a search filter is hiding the target, clear it so the construction is visible
  const firstItem = el.list.querySelector(`.construction-item[data-id="${ids[0]}"]`);
  if (!firstItem && el.search.value) {
    el.search.value = '';
    renderList('');
    // renderList re-applies .active to state.currentId — strip it again
    el.list.querySelectorAll('.construction-item.active').forEach(n => n.classList.remove('active'));
  }
  apply();
}

function scrollSidebarTo(id) {
  const target = el.list.querySelector(`.construction-item[data-id="${id}"]`);
  if (!target) return;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const tRect = target.getBoundingClientRect();
    const cRect = el.list.getBoundingClientRect();
    el.list.scrollTop += (tRect.top - cRect.top) - cRect.height * 0.33;
  }));
}

function highlightStoryCurrent() {
  el.storyView.querySelectorAll('.story-sentence.current').forEach(n => n.classList.remove('current'));
  const target = el.storyView.querySelector(`.story-sentence[data-idx="${storyState.currentSentenceIdx}"]`);
  if (target) {
    target.classList.add('current');
    const body = document.getElementById('storyBody');
    if (body) {
      const targetRect = target.getBoundingClientRect();
      const containerRect = body.getBoundingClientRect();
      const delta = targetRect.top - containerRect.top;
      body.scrollTop += delta - containerRect.height * 0.33;
    }
  }
}

async function speakStorySentence(idx) {
  const story = STORIES.find(s => s.id === storyState.currentStoryId);
  if (!story) return;
  const s = story.sentences[idx];
  if (!s) return;
  await speak(s.en, 'en');
}

function waitStory(seconds, token) {
  return new Promise((resolve) => {
    const start = Date.now();
    const check = () => {
      if (token !== storyState.playToken) return resolve(); // cancelled
      if (Date.now() - start >= seconds * 1000) return resolve();
      setTimeout(check, 50);
    };
    check();
  });
}

async function startStoryPlay() {
  if (storyState.isPlaying) return;
  storyState.isPlaying = true;
  storyState.playToken++;
  const myToken = storyState.playToken;
  const btn = document.getElementById('storyPlayAllBtn');
  if (btn) btn.classList.add('playing');
  const playIcon = btn ? btn.querySelector('.icon-play') : null;
  const pauseIcon = btn ? btn.querySelector('.icon-pause') : null;
  if (playIcon) playIcon.style.display = 'none';
  if (pauseIcon) pauseIcon.style.display = 'block';

  const story = STORIES.find(s => s.id === storyState.currentStoryId);
  if (!story) { stopStoryPlay(); return; }

  while (storyState.isPlaying && myToken === storyState.playToken && storyState.currentSentenceIdx < story.sentences.length) {
    highlightStoryCurrent();
    const reps = storyState.repeat;
    for (let r = 0; r < reps; r++) {
      await speakStorySentence(storyState.currentSentenceIdx);
      if (myToken !== storyState.playToken) break;
      // 繰り返しの合間と、次の文へ移る前に間隔を入れる
      if (storyState.gap > 0) await waitStory(storyState.gap, myToken);
      if (myToken !== storyState.playToken) break;
    }
    if (myToken !== storyState.playToken) break;
    storyState.currentSentenceIdx++;
  }

  if (myToken === storyState.playToken) {
    storyState.currentSentenceIdx = 0;
    stopStoryPlay();
  }
}

function stopStoryPlay() {
  storyState.isPlaying = false;
  storyState.playToken++;
  stopSpeak();
  const btn = document.getElementById('storyPlayAllBtn');
  if (btn) {
    btn.classList.remove('playing');
    const playIcon = btn.querySelector('.icon-play');
    const pauseIcon = btn.querySelector('.icon-pause');
    if (playIcon) playIcon.style.display = 'block';
    if (pauseIcon) pauseIcon.style.display = 'none';
  }
}

function isBrowseActive() {
  return el.browseView.classList.contains('active');
}

function highlightBrowseCurrent() {
  // remove previous
  el.browseView.querySelectorAll('.browse-construction.current').forEach(n => n.classList.remove('current'));
  const target = el.browseView.querySelector(`.browse-construction[data-id="${state.currentId}"]`);
  if (target) target.classList.add('current');
}


function selectConstruction(id) {
  stopPlaying();
  state.currentId = id;
  state.currentIdx = 0;
  state.shuffleOrder = null;
  renderList(el.search.value);
  renderConstruction();
  // If browse view is open, scroll to the selected construction there too
  if (isBrowseActive()) {
    highlightBrowseCurrent();
    scrollBrowseTo(id);
  }
}

function currentConstruction() {
  return CONSTRUCTIONS.find(c => c.id === state.currentId);
}

function examples() {
  const c = currentConstruction();
  if (!c) return [];
  if (state.shuffleOrder) {
    return state.shuffleOrder.map(i => c.examples[i]);
  }
  return c.examples;
}

function renderConstruction() {
  const c = currentConstruction();
  el.patternNum.textContent = String(c.id).padStart(2, '0');
  el.patternText.textContent = c.pattern;
  el.patternMeaning.textContent = c.meaning;

  // placeholder?
  if (c.placeholder || !c.examples.length) {
    el.card.style.display = 'none';
    el.progressRow.innerHTML = '';
    let msg = el.stage.querySelector('.placeholder-message');
    if (!msg) {
      msg = document.createElement('div');
      msg.className = 'placeholder-message';
      el.stage.appendChild(msg);
    }
    msg.innerHTML = `
      <strong>この構文はまだ追加されていません</strong>
      Hiroが「構文 ${c.id} の例文を追加して」と頼むと、Claudeが12パターンを生成して data.js に追加します。
    `;
    [el.btnPrev, el.btnNext, el.btnSpeak, el.btnPlay, el.btnShuffle, el.btnRandomC].forEach(b => b.disabled = true);
    return;
  }

  // normal
  const msg = el.stage.querySelector('.placeholder-message');
  if (msg) msg.remove();
  el.card.style.display = '';
  [el.btnPrev, el.btnNext, el.btnSpeak, el.btnPlay, el.btnShuffle, el.btnRandomC].forEach(b => b.disabled = false);

  renderProgress();
  renderExample();
}

function renderProgress() {
  const exs = examples();
  el.progressRow.innerHTML = exs.map((_, i) => {
    let cls = 'progress-pip';
    if (i < state.currentIdx) cls += ' done';
    else if (i === state.currentIdx) cls += ' current';
    return `<div class="${cls}"></div>`;
  }).join('');
}

function renderExample() {
  const exs = examples();
  const ex = exs[state.currentIdx];
  if (!ex) return;

  el.exCurrent.textContent = state.currentIdx + 1;
  el.exTotal.textContent = exs.length;
  el.exampleEn.textContent = ex.en;
  el.exampleJa.textContent = ex.ja;
  el.exampleJa.classList.toggle('hidden', !state.showJa);
  renderProgress();
}

// ============================================================
// NAVIGATION
// ============================================================
function goNext() {
  stopPlaying();
  const exs = examples();
  if (state.currentIdx < exs.length - 1) {
    state.currentIdx++;
    renderExample();
  }
}
function goPrev() {
  stopPlaying();
  if (state.currentIdx > 0) {
    state.currentIdx--;
    renderExample();
  }
}
function shuffle() {
  stopPlaying();
  const c = currentConstruction();
  if (!c || !c.examples.length) return;
  const order = [...c.examples.keys()];
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  state.shuffleOrder = order;
  state.currentIdx = 0;
  renderExample();
}

// ============================================================
// CONSTRUCTION-LEVEL NAVIGATION (for flow modes)
// ============================================================

// Get list of construction IDs that actually have examples
function availableConstructionIds() {
  return CONSTRUCTIONS.filter(c => !c.placeholder && c.examples.length > 0).map(c => c.id);
}

// Jump to a random construction (not the current one if possible)
function jumpToRandomConstruction(autoPlay = false) {
  const ids = availableConstructionIds();
  if (ids.length === 0) return;
  const others = ids.filter(id => id !== state.currentId);
  const pool = others.length > 0 ? others : ids;
  const nextId = pool[Math.floor(Math.random() * pool.length)];
  const wasPlaying = state.isPlaying || autoPlay;
  selectConstruction(nextId);
  // If flow mode is shuffle-all, also shuffle examples
  if (el.optFlow.value === 'shuffle-all') {
    const c = currentConstruction();
    const order = [...c.examples.keys()];
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }
    state.shuffleOrder = order;
    state.currentIdx = 0;
    renderExample();
  }
  if (wasPlaying) startPlaying();
}

// Move to the next construction in sequential order
function jumpToNextSequentialConstruction(autoPlay = false) {
  const ids = availableConstructionIds();
  if (ids.length === 0) return;
  const curIdx = ids.indexOf(state.currentId);
  // wrap around
  const nextIdx = (curIdx + 1) % ids.length;
  const nextId = ids[nextIdx];
  const wasPlaying = state.isPlaying || autoPlay;
  selectConstruction(nextId);
  if (wasPlaying) startPlaying();
}

// Called when auto-play finishes the last example of a construction
function handleConstructionEnd(token) {
  const flow = el.optFlow.value;
  if (flow === 'single') return false; // stop
  if (token !== state.playToken) return false;

  if (flow === 'sequential') {
    jumpToNextSequentialConstruction(true);
    return true;
  }
  if (flow === 'shuffle-c' || flow === 'shuffle-all') {
    jumpToRandomConstruction(true);
    return true;
  }
  return false;
}

// ============================================================
// TTS (Web Speech API)
// ============================================================
let voicesLoaded = false;
let cachedEnVoice = null;
let cachedJaVoice = null;

function loadVoices() {
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return false;
  // prefer en-US/en-GB voices, then any en
  cachedEnVoice =
    voices.find(v => /en-US/i.test(v.lang)) ||
    voices.find(v => /en-GB/i.test(v.lang)) ||
    voices.find(v => /^en/i.test(v.lang)) ||
    voices[0];
  cachedJaVoice =
    voices.find(v => /ja-JP/i.test(v.lang)) ||
    voices.find(v => /^ja/i.test(v.lang)) ||
    null;
  voicesLoaded = true;
  return true;
}

if ('speechSynthesis' in window) {
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(text, lang = 'en') {
  return new Promise((resolve) => {
    if (!('speechSynthesis' in window)) {
      resolve();
      return;
    }
    if (!voicesLoaded) loadVoices();

    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = lang === 'ja' ? 'ja-JP' : 'en-US';
    utter.rate = parseFloat(el.optRate.value);
    const voice = lang === 'ja' ? cachedJaVoice : cachedEnVoice;
    if (voice) utter.voice = voice;

    utter.onend = resolve;
    utter.onerror = resolve;

    speechSynthesis.speak(utter);
  });
}

function stopSpeak() {
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel();
  }
}

// ============================================================
// PLAYBACK
// ============================================================
function wait(seconds, token) {
  return new Promise((resolve) => {
    const start = Date.now();
    const check = () => {
      if (token !== state.playToken) return resolve(); // cancelled
      if (Date.now() - start >= seconds * 1000) return resolve();
      setTimeout(check, 50);
    };
    check();
  });
}

async function speakCurrent() {
  const exs = examples();
  const ex = exs[state.currentIdx];
  if (!ex) return;
  el.exampleEn.classList.add('speaking');
  const mode = el.optMode.value;
  if (mode === 'ja-en') {
    await speak(ex.ja, 'ja');
    await wait(0.4, state.playToken);
    await speak(ex.en, 'en');
  } else if (mode === 'en-ja') {
    await speak(ex.en, 'en');
    await wait(0.4, state.playToken);
    await speak(ex.ja, 'ja');
  } else {
    await speak(ex.en, 'en');
  }
  el.exampleEn.classList.remove('speaking');
}

async function startPlaying() {
  if (state.isPlaying) return;
  state.isPlaying = true;
  state.playToken++;
  const myToken = state.playToken;
  el.btnPlay.classList.add('playing');

  const repeat = parseInt(el.optRepeat.value, 10) || 1;
  const gap = parseFloat(el.optGap.value) || 0;

  while (state.isPlaying && myToken === state.playToken) {
    const exs = examples();
    if (state.currentIdx >= exs.length) break;

    // Speak current example, repeat times
    for (let r = 0; r < repeat; r++) {
      if (myToken !== state.playToken) break;
      await speakCurrent();
      if (myToken !== state.playToken) break;
      await wait(gap, myToken);
    }
    if (myToken !== state.playToken) break;

    // Move to next example, or next construction
    if (state.currentIdx < exs.length - 1) {
      state.currentIdx++;
      renderExample();
      await wait(0.2, myToken);
    } else {
      // End of current construction — decide based on flow mode
      const flow = el.optFlow.value;
      if (flow === 'single') {
        break; // stop here
      }
      // longer pause between constructions
      await wait(Math.max(gap, 1.2), myToken);
      if (myToken !== state.playToken) break;

      if (flow === 'sequential') {
        // jump to next construction (without recursive startPlaying)
        const ids = availableConstructionIds();
        if (ids.length === 0) break;
        const curIdx = ids.indexOf(state.currentId);
        const nextId = ids[(curIdx + 1) % ids.length];
        state.currentId = nextId;
        state.currentIdx = 0;
        state.shuffleOrder = null;
        renderList(el.search.value);
        renderConstruction();
      } else if (flow === 'shuffle-c' || flow === 'shuffle-all') {
        const ids = availableConstructionIds();
        if (ids.length === 0) break;
        const others = ids.filter(id => id !== state.currentId);
        const pool = others.length > 0 ? others : ids;
        const nextId = pool[Math.floor(Math.random() * pool.length)];
        state.currentId = nextId;
        state.currentIdx = 0;
        state.shuffleOrder = null;
        if (flow === 'shuffle-all') {
          const c = currentConstruction();
          const order = [...c.examples.keys()];
          for (let i = order.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [order[i], order[j]] = [order[j], order[i]];
          }
          state.shuffleOrder = order;
        }
        renderList(el.search.value);
        renderConstruction();
      }
    }
  }

  if (myToken === state.playToken) {
    stopPlaying();
  }
}

function stopPlaying() {
  state.isPlaying = false;
  state.playToken++;
  stopSpeak();
  el.btnPlay.classList.remove('playing');
  el.exampleEn.classList.remove('speaking');
}

function togglePlay() {
  if (state.isPlaying) stopPlaying();
  else startPlaying();
}

// ============================================================
// EVENTS
// ============================================================
el.search.addEventListener('input', () => renderList(el.search.value));
el.btnPrev.addEventListener('click', goPrev);
el.btnNext.addEventListener('click', goNext);
el.btnSpeak.addEventListener('click', async () => {
  stopPlaying();
  state.playToken++;
  await speakCurrent();
});
el.btnPlay.addEventListener('click', togglePlay);
el.btnShuffle.addEventListener('click', shuffle);
el.btnRandomC.addEventListener('click', () => jumpToRandomConstruction());

el.tabDrill.addEventListener('click', () => switchView('drill'));
el.tabBrowse.addEventListener('click', () => switchView('browse'));
el.tabStory.addEventListener('click', () => switchView('story'));

el.optShowJa.addEventListener('click', () => {
  state.showJa = !state.showJa;
  el.optShowJa.classList.toggle('on', state.showJa);
  el.exampleJa.classList.toggle('hidden', !state.showJa);
  // also toggle in story view if active
  el.storyView.querySelectorAll('.story-sentence-ja').forEach(node => {
    node.classList.toggle('hidden', !state.showJa);
  });
});

// keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  switch (e.key) {
    case 'ArrowRight':
      e.preventDefault();
      goNext();
      break;
    case 'ArrowLeft':
      e.preventDefault();
      goPrev();
      break;
    case ' ':
      e.preventDefault();
      stopPlaying();
      state.playToken++;
      speakCurrent();
      break;
    case 'j':
    case 'J':
      e.preventDefault();
      el.optShowJa.click();
      break;
    case 'p':
    case 'P':
      e.preventDefault();
      togglePlay();
      break;
    case 's':
    case 'S':
      e.preventDefault();
      shuffle();
      break;
    case 'r':
    case 'R':
      e.preventDefault();
      jumpToRandomConstruction();
      break;
  }
});

// stop TTS on page hide
document.addEventListener('visibilitychange', () => {
  if (document.hidden) stopPlaying();
});

// ============================================================
// INIT
// ============================================================
renderList();
renderConstruction();

</script>
</body>
</html>
